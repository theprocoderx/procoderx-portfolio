<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magan Singh | StackForge</title>

    <!-- font preload -->
    <link rel="preload" href="/fonts/Nunito-Bold.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Nunito-Regular.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Baaki ke tags... -->

    <!-- RESPONSIVE PRELOAD: Jiski screen, sirf wahi download hogi! -->
    <!-- Mobile ke liye (Screen width 639px tak) -->
    <link
      rel="preload"
      href="/msf-logo-148.webp"
      as="image"
      type="image/webp"
      fetchpriority="high"
      media="(max-width: 639px)"
    />

    <!-- Tablet ke liye (Screen width 640px se 1023px tak) -->
    <link
      rel="preload"
      href="/msf-logo-68.webp"
      as="image"
      type="image/webp"
      fetchpriority="high"
      media="(min-width: 640px) and (max-width: 1023px)"
    />

    <!-- Laptop/Badi screen ke liye (Screen width 1024px ya usse badi) -->
    <link
      rel="preload"
      href="/msf-logo-96.webp"
      as="image"
      type="image/webp"
      fetchpriority="high"
      media="(min-width: 1024px)"
    />

    <link rel="icon" type="image/webp" href="/msf-logo.webp" />
  </head>
  <body>
    <div id="root" class="font-sans"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
